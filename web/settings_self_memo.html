<!DOCTYPE html>
<html lang="{{t:html_lang}}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{t:selfmemo_title}}</title>
    <link rel="icon" href="/static/images/favicon.ico" sizes="16x16 32x32">
    <link rel="apple-touch-icon" href="/static/images/favicon.png" sizes="180x180">
    <link rel="stylesheet" href="/static/theme-tokens.css?v=4">
    <link rel="stylesheet" href="/static/dashboard.css?v=9">
    <link rel="stylesheet" href="/static/settings_form.css?v=1">
    <script src="/static/theme.js?v=4"></script>
</head>

<body>
    <div class="header">
        <h1>⚙️ {{t:settings_heading}}</h1>
        <div class="nav-links">
            <button id="themeToggle" class="nav-button">☀️/🌙</button>
        </div>
    </div>

    <div class="settings-container">
        <!-- ナビゲーション（settings_nav.js が縦サイドバーを描画） -->
        <div id="settingsNav"></div>

        <div class="alert-error" id="errorMessage"></div>
        <div class="alert-success" id="successMessage"></div>

        <div class="settings-panel">
            <div class="settings-header">{{t:selfmemo_section_header}}</div>
            <div class="settings-content">
                <p class="small-note" style="margin-bottom: 15px;">
                    {{t:selfmemo_desc}}
                </p>
                <form id="memoForm" onsubmit="return saveConfig(event)" novalidate>
                    <div class="form-group">
                        <label class="toggle-row">
                            <span class="switch"><input type="checkbox" id="enabled"><span class="slider"></span></span>
                            <span>{{t:selfmemo_label_enabled}}</span>
                        </label>
                        <small class="small-note">{{t:selfmemo_help_enabled}}</small>
                    </div>
                    <div class="form-group">
                        <label>{{t:selfmemo_label_max_chars}}</label>
                        <input type="number" id="maxChars" class="form-control" step="10" min="0" max="100000">
                        <small class="small-note">{{t:selfmemo_help_max_chars}}</small>
                    </div>
                    <div class="form-group">
                        <label>{{t:selfmemo_label_file}}</label>
                        <input type="text" id="file" class="form-control" placeholder="memory/self_memo.md">
                        <small class="small-note">{{t:selfmemo_help_file}}</small>
                    </div>

                    <button type="submit" class="btn-primary" style="margin-top: 10px;">{{t:settings_save_button}}</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        async function loadConfig() {
            try {
                const res = await fetch('/api/settings/self-memo');
                if (!res.ok) throw new Error(T.settings_load_error);
                const data = await res.json();
                document.getElementById('enabled').checked = data.enabled === true;
                document.getElementById('maxChars').value = data.max_chars ?? 500;
                document.getElementById('file').value = data.file || 'memory/self_memo.md';
            } catch (e) { showError(e.message); }
        }

        async function saveConfig(event) {
            event.preventDefault();
            hideError();
            const payload = {
                enabled: document.getElementById('enabled').checked,
                max_chars: parseInt(document.getElementById('maxChars').value),
                file: document.getElementById('file').value.trim() || 'memory/self_memo.md'
            };
            try {
                const res = await fetch('/api/settings/self-memo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error(T.settings_save_error);
                showSuccess(T.selfmemo_save_success);
            } catch (e) { showError(e.message); }
            return false;
        }

        function showError(msg) {
            hideSuccess();
            const el = document.getElementById('errorMessage');
            el.innerText = msg; el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }
        function showSuccess(msg) {
            hideError();
            const el = document.getElementById('successMessage');
            el.innerText = msg; el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }
        function hideError() { document.getElementById('errorMessage').style.display = 'none'; }
        function hideSuccess() { document.getElementById('successMessage').style.display = 'none'; }

        document.addEventListener('DOMContentLoaded', loadConfig);
    </script>
    <script src="/static/settings_nav.js?v=1"></script>
</body>

</html>
