<!DOCTYPE html>
<html lang="{{t:html_lang}}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{t:tips_title}}</title>
    <link rel="icon" href="/static/images/favicon.ico" sizes="16x16 32x32">
    <link rel="apple-touch-icon" href="/static/images/favicon.png" sizes="180x180">
    <link rel="stylesheet" href="/static/theme-tokens.css?v=4">
    <link rel="stylesheet" href="/static/dashboard.css?v=9">
    <link rel="stylesheet" href="/static/settings_form.css?v=1">
    <script src="/static/theme.js?v=4"></script>
</head>

<body>
    <div class="header">
        <h1>⚙️ {{t:settings_heading}}</h1>
        <div class="nav-links">
            <button id="themeToggle" class="nav-button">☀️/🌙</button>
        </div>
    </div>

    <div class="settings-container">
        <!-- ナビゲーション（settings_nav.js が縦サイドバーを描画） -->
        <div id="settingsNav"></div>

        <div class="alert-error" id="errorMessage"></div>
        <div class="alert-success" id="successMessage"></div>

        <div class="settings-panel">
            <div class="settings-header">{{t:tips_section_header}}</div>
            <div class="settings-content">
                <p class="small-note" style="margin-bottom: 15px;">
                    {{t:tips_desc}}
                </p>

                <!-- システムON/OFF（最上部マスタートグル） -->
                <div class="master-toggle">
                    <label class="switch">
                        <input type="checkbox" id="tipsEnabled">
                        <span class="slider"></span>
                    </label>
                    <div class="master-toggle-text">
                        <strong>{{t:tips_label_enabled}}</strong>
                        <small class="small-note">{{t:tips_help_enabled}}</small>
                    </div>
                </div>

                <div id="tipsList"></div>

                <button type="button" class="btn-secondary" onclick="addTip()" style="margin-top: 6px;">{{t:tips_btn_add}}</button>

                <div style="margin-top: 20px;">
                    <button type="button" class="btn-primary" onclick="saveConfig()">{{t:settings_save_button}}</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
        }

        function renderTips(list) {
            const c = document.getElementById('tipsList');
            c.innerHTML = '';
            list.forEach((text, i) => {
                const row = document.createElement('div');
                row.style.cssText = 'display:flex;align-items:flex-start;gap:6px;margin-bottom:10px;';
                row.innerHTML = `
                    <span style="font-size:0.8em;color:var(--text-muted);min-width:1.6em;text-align:right;padding-top:10px;">${i + 1}.</span>
                    <textarea class="form-control tip-input" rows="2" style="flex:1;">${escapeHtml(text)}</textarea>
                    <div style="display:flex;flex-direction:column;gap:4px;">
                        <button type="button" onclick="moveTip(${i},-1)" title="上へ"
                            style="background:var(--bg-hover);border:1px solid var(--border);border-radius:4px;padding:4px 8px;cursor:pointer;">▲</button>
                        <button type="button" onclick="moveTip(${i},1)" title="下へ"
                            style="background:var(--bg-hover);border:1px solid var(--border);border-radius:4px;padding:4px 8px;cursor:pointer;">▼</button>
                        <button type="button" onclick="removeTip(${i})" title="削除"
                            style="background:transparent;border:1px solid var(--danger,#e57373);color:var(--danger,#e57373);border-radius:4px;padding:4px 8px;cursor:pointer;">✕</button>
                    </div>
                `;
                c.appendChild(row);
            });
        }

        function getTips() {
            return [...document.querySelectorAll('.tip-input')]
                .map(t => t.value.trim())
                .filter(t => t !== '');
        }

        function addTip() {
            const l = getTips(); l.push(''); renderTips(l);
        }
        function removeTip(i) {
            const l = getTips(); l.splice(i, 1); renderTips(l);
        }
        function moveTip(i, dir) {
            const l = getTips(); const j = i + dir;
            if (j < 0 || j >= l.length) return;
            [l[i], l[j]] = [l[j], l[i]]; renderTips(l);
        }

        async function loadConfig() {
            try {
                const res = await fetch('/api/settings/tips');
                if (!res.ok) throw new Error(T.settings_load_error);
                const data = await res.json();
                document.getElementById('tipsEnabled').checked = data.enabled !== false;
                renderTips(Array.isArray(data.tips) ? data.tips : []);
            } catch (e) { showError(e.message); }
        }

        async function saveConfig() {
            hideError();
            const payload = {
                enabled: document.getElementById('tipsEnabled').checked,
                tips: getTips()
            };
            try {
                const res = await fetch('/api/settings/tips', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error(T.settings_save_error);
                showSuccess(T.tips_save_success);
            } catch (e) { showError(e.message); }
        }

        function showError(msg) {
            hideSuccess();
            const el = document.getElementById('errorMessage');
            el.innerText = msg; el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }
        function showSuccess(msg) {
            hideError();
            const el = document.getElementById('successMessage');
            el.innerText = msg; el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }
        function hideError() { document.getElementById('errorMessage').style.display = 'none'; }
        function hideSuccess() { document.getElementById('successMessage').style.display = 'none'; }

        document.addEventListener('DOMContentLoaded', loadConfig);
    </script>
    <script src="/static/settings_nav.js?v=1"></script>
</body>

</html>
