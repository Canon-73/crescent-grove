<!DOCTYPE html>
<html lang="{{t:html_lang}}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{t:openclaw_title}}</title>
    <link rel="icon" href="/static/images/favicon.ico" sizes="16x16 32x32">
    <link rel="apple-touch-icon" href="/static/images/favicon.png" sizes="180x180">
    <link rel="stylesheet" href="/static/theme-tokens.css?v=4">
    <link rel="stylesheet" href="/static/dashboard.css?v=9">
    <link rel="stylesheet" href="/static/settings_form.css?v=1">
    <script src="/static/theme.js?v=4"></script>
    <style>
        /* 要再起動を派手に知らせる常設バナー（赤・点滅） */
        .restart-banner {
            background: linear-gradient(90deg, #b71c1c, #e53935);
            color: #fff;
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 18px;
            font-weight: bold;
            font-size: 1.02em;
            line-height: 1.6;
            box-shadow: 0 2px 10px rgba(229, 57, 53, 0.4);
            border: 2px solid #ff8a80;
            animation: restart-banner-pulse 1.6s ease-in-out infinite;
        }

        @keyframes restart-banner-pulse {
            0%, 100% { box-shadow: 0 0 8px rgba(229, 57, 53, 0.4); }
            50% { box-shadow: 0 0 22px rgba(229, 57, 53, 0.9); }
        }

        /* 保存直後の全画面モーダル */
        .restart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .restart-overlay.show {
            display: flex;
        }

        .restart-modal {
            background: var(--panel-bg);
            border: 3px solid #e53935;
            border-radius: 14px;
            max-width: 460px;
            width: calc(100% - 40px);
            padding: 30px 28px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .restart-modal .big-icon {
            font-size: 3.4em;
            line-height: 1;
            margin-bottom: 8px;
            animation: restart-icon-blink 0.9s steps(2, start) infinite;
        }

        @keyframes restart-icon-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .restart-modal h2 {
            margin: 6px 0 4px;
            color: var(--text-primary);
        }

        .restart-modal .restart-strong {
            color: #e53935;
            font-size: 1.25em;
            font-weight: bold;
            margin: 14px 0;
            display: block;
        }

        .restart-modal p {
            color: var(--text-secondary);
            line-height: 1.7;
            margin: 8px 0 18px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>⚙️ {{t:settings_heading}}</h1>
        <div class="nav-links">
            <button id="themeToggle" class="nav-button">☀️/🌙</button>
        </div>
    </div>

    <div class="settings-container">
        <!-- ナビゲーション（settings_nav.js が縦サイドバーを描画） -->
        <div id="settingsNav"></div>

        <div class="alert-error" id="errorMessage"></div>
        <div class="alert-success" id="successMessage"></div>

        <!-- 常設の要再起動バナー -->
        <div class="restart-banner">
            {{t:openclaw_restart_banner}}
        </div>

        <div class="settings-panel">
            <div class="settings-header">{{t:openclaw_section_header}}</div>
            <div class="settings-content">
                <!-- 機能全体のオンオフ（最上部マスタートグル） -->
                <div class="master-toggle">
                    <label class="switch">
                        <input type="checkbox" id="openclawEnabled">
                        <span class="slider"></span>
                    </label>
                    <div class="master-toggle-text">
                        <strong>{{t:openclaw_label_enabled}}</strong>
                        <small class="small-note">{{t:openclaw_help_enabled}}</small>
                    </div>
                </div>

                <div class="freeform-banner">
                    {{t:openclaw_freeform_banner}}
                </div>

                <div class="form-group">
                    <textarea id="jsonEditor" class="form-control json-editor" spellcheck="false"></textarea>
                </div>

                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                    <button type="button" class="btn-primary" onclick="saveConfig()">{{t:settings_save_button}}</button>
                    <button type="button" class="btn-secondary" onclick="formatJson()">{{t:openclaw_btn_format}}</button>
                    <button type="button" class="btn-secondary" onclick="loadConfig()">{{t:openclaw_btn_reload}}</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 保存直後の全画面モーダル -->
    <div class="restart-overlay" id="restartOverlay">
        <div class="restart-modal">
            <div class="big-icon">🔄</div>
            <h2>{{t:openclaw_modal_saved}}</h2>
            <span class="restart-strong">{{t:openclaw_modal_restart_required}}</span>
            <p>
                {{t:openclaw_modal_desc}}
            </p>
            <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
                <button type="button" class="btn-primary" onclick="closeOverlay()">{{t:openclaw_btn_close}}</button>
                <button type="button" class="btn-secondary" onclick="markRestarted()">{{t:openclaw_btn_mark_restarted}}</button>
            </div>
        </div>
    </div>

    <script>
        const RESTART_KEY = 'cg_openclaw_dirty';

        async function loadConfig() {
            try {
                const res = await fetch('/api/settings/openclaw');
                if (!res.ok) throw new Error(T.settings_load_error);
                const data = await res.json();
                document.getElementById('openclawEnabled').checked = data.enabled !== false;
                document.getElementById('jsonEditor').value = JSON.stringify(data, null, 2);
                hideError(); hideSuccess();
            } catch (e) { showError(e.message); }
        }

        function formatJson() {
            const ed = document.getElementById('jsonEditor');
            try {
                ed.value = JSON.stringify(JSON.parse(ed.value), null, 2);
                hideError();
            } catch (e) {
                showError(T.openclaw_json_syntax_error + e.message);
            }
        }

        async function saveConfig() {
            hideError(); hideSuccess();
            const raw = document.getElementById('jsonEditor').value;
            let parsed;
            try {
                parsed = JSON.parse(raw);
            } catch (e) {
                showError(T.openclaw_json_save_error + e.message);
                return;
            }
            // マスタートグルの値を JSON の enabled に反映（トグルを正とする）。
            parsed.enabled = document.getElementById('openclawEnabled').checked;
            document.getElementById('jsonEditor').value = JSON.stringify(parsed, null, 2);
            try {
                const res = await fetch('/api/settings/openclaw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(parsed)
                });
                if (!res.ok) {
                    const d = await res.json().catch(() => ({}));
                    throw new Error(d.detail || T.settings_save_error);
                }
                // 再起動待ちフラグを立て、サイドバーにバッジを出す
                if (window.settingsNav) window.settingsNav.setRestartPending(RESTART_KEY, true);
                showOverlay();
            } catch (e) { showError(e.message); }
        }

        function showOverlay() { document.getElementById('restartOverlay').classList.add('show'); }
        function closeOverlay() { document.getElementById('restartOverlay').classList.remove('show'); }
        function markRestarted() {
            if (window.settingsNav) window.settingsNav.setRestartPending(RESTART_KEY, false);
            closeOverlay();
        }

        function showError(msg) {
            hideSuccess();
            const el = document.getElementById('errorMessage');
            el.innerText = msg; el.style.display = 'block';
        }
        function showSuccess(msg) {
            hideError();
            const el = document.getElementById('successMessage');
            el.innerText = msg; el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }
        function hideError() { document.getElementById('errorMessage').style.display = 'none'; }
        function hideSuccess() { document.getElementById('successMessage').style.display = 'none'; }

        document.addEventListener('DOMContentLoaded', loadConfig);
    </script>
    <script src="/static/settings_nav.js?v=1"></script>
</body>

</html>
