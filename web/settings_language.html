<!DOCTYPE html>
<html lang="{{t:html_lang}}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{t:lang_title}}</title>
    <link rel="icon" href="/static/images/favicon.ico" sizes="16x16 32x32">
    <link rel="apple-touch-icon" href="/static/images/favicon.png" sizes="180x180">
    <link rel="stylesheet" href="/static/theme-tokens.css?v=4">
    <link rel="stylesheet" href="/static/dashboard.css?v=9">
    <link rel="stylesheet" href="/static/settings_form.css?v=1">
    <script src="/static/theme.js?v=4"></script>
</head>

<body>
    <div class="header">
        <h1>⚙️ {{t:settings_heading}}</h1>
        <div class="nav-links">
            <button id="themeToggle" class="nav-button">☀️/🌙</button>
        </div>
    </div>

    <div class="settings-container">
        <div id="settingsNav"></div>

        <div class="alert-error" id="errorMessage"></div>
        <div class="alert-success" id="successMessage"></div>

        <div class="settings-panel">
            <div class="settings-header">{{t:lang_section_header}}</div>
            <div class="settings-content">
                <p class="small-note" style="margin-bottom: 15px;">
                    {{t:lang_desc}}
                </p>
                <form id="langForm" onsubmit="return saveLanguage(event)" novalidate>
                    <div class="form-group">
                        <label>{{t:lang_label}}</label>
                        <select id="langSelect" class="form-control">
                            <option value="ja">日本語 / Japanese</option>
                            <option value="en">English / 英語</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top: 10px;">{{t:settings_save_button}}</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/settings_nav.js?v=5"></script>
    <script>
        const errorEl = document.getElementById("errorMessage");
        const successEl = document.getElementById("successMessage");

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = "block";
            successEl.style.display = "none";
        }
        function showSuccess(msg) {
            successEl.textContent = msg;
            successEl.style.display = "block";
            errorEl.style.display = "none";
        }

        async function loadLanguage() {
            try {
                const res = await fetch("/api/settings/language");
                if (!res.ok) throw new Error(res.statusText);
                const data = await res.json();
                document.getElementById("langSelect").value = data.language || "ja";
            } catch (e) {
                showError((T.lang_load_error || "Failed to load language setting") + ": " + e.message);
            }
        }

        async function saveLanguage(ev) {
            ev.preventDefault();
            const lang = document.getElementById("langSelect").value;
            try {
                const res = await fetch("/api/settings/language", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ language: lang }),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || res.statusText);
                }
                showSuccess(T.lang_saved || "Language saved. Restart the server to apply.");
                if (window.settingsNav) {
                    window.settingsNav.setRestartPending("cg_language_dirty", true);
                }
            } catch (e) {
                showError(e.message);
            }
            return false;
        }

        loadLanguage();
    </script>
</body>

</html>
