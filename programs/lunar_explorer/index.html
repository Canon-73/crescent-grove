<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f3ed;
    --surface: #fffdf9;
    --surface2: #f0ebe3;
    --border: rgba(150, 125, 100, 0.2);
    --border-focus: rgba(110, 85, 55, 0.4);
    --moon: #3e2f1c;
    --moon-mid: #6b5030;
    --accent: #5a8a78;
    --accent-border: rgba(90, 138, 120, 0.4);
    --text: #2c2018;
    --text-mid: #5e4a38;
    --text-dim: #9a8268;
    --shadow: rgba(80, 60, 40, 0.08);
    --shadow-md: rgba(80, 60, 40, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(200, 185, 160, 0.25) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 90% 90%, rgba(160, 185, 175, 0.15) 0%, transparent 60%);
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 28px;
  }

  header {
    padding: 52px 0 44px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .moon-mark { width: 40px; height: 40px; flex-shrink: 0; }
  .moon-mark svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 2px 6px rgba(120, 90, 50, 0.2));
  }

  .header-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--moon);
    line-height: 1;
  }

  .header-text p {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 7px;
  }

  .search-area { margin-bottom: 36px; }

  .search-box {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 2px 12px var(--shadow);
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .search-box:focus-within {
    border-color: var(--border-focus);
    box-shadow: 0 4px 20px var(--shadow-md);
  }

  .search-prefix {
    padding: 0 14px;
    color: var(--accent);
    font-size: 0.7rem;
    opacity: 0.8;
    white-space: nowrap;
    user-select: none;
  }

  #query {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.875rem;
    padding: 17px 0;
    caret-color: var(--accent);
  }

  #query::placeholder {
    color: var(--text-dim);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    font-weight: 300;
  }

  .search-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-right: 12px;
  }

  .iter-label { font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.1em; }

  .iter-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-mid);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    outline: none;
  }

  #searchBtn {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    padding: 7px 16px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    box-shadow: 0 1px 4px rgba(122, 158, 142, 0.3);
  }

  #searchBtn:hover {
    background: #6a8e7e;
    transform: translateY(-1px);
    box-shadow: 0 3px 10px rgba(122, 158, 142, 0.35);
  }

  #searchBtn:active { transform: translateY(0); }
  #searchBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .loading { display: none; margin-top: 28px; }
  .loading.active { display: block; }

  .loading-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }

  .spinner {
    width: 26px;
    height: 26px;
    border: 1.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 0.72rem; color: var(--text-mid); }
  .loading-text em { font-style: normal; color: var(--accent); }

  .live-log {
    margin-left: 40px;
    border-left: 1.5px solid var(--border);
    padding-left: 14px;
  }

  .log-item {
    font-size: 0.65rem;
    padding: 3px 0;
    animation: slideIn 0.25s ease;
  }

  .log-item.q { color: var(--moon-mid); }
  .log-item.j { color: var(--text-dim); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-5px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .error-area {
    display: none;
    margin-top: 20px;
    padding: 14px 18px;
    background: #fdf0ee;
    border: 1px solid rgba(200, 100, 80, 0.2);
    border-radius: 4px;
    font-size: 0.75rem;
    color: #a05040;
  }
  .error-area.active { display: block; }

  .result-area { display: none; animation: fadeUp 0.4s ease; }
  .result-area.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding-bottom: 18px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .result-label {
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: block;
    margin-bottom: 6px;
  }

  .result-query {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 400;
    color: var(--moon);
    font-style: italic;
  }

  .log-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .badge {
    font-size: 0.58rem;
    color: var(--text-dim);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 100px;
  }

  .badge .n { color: var(--accent); margin-right: 5px; }

  .answer {
    font-size: 0.875rem;
    line-height: 1.95;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 32px;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .answer h1, .answer h2, .answer h3 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    color: var(--moon);
    margin: 24px 0 10px;
    letter-spacing: 0.03em;
    line-height: 1.3;
  }

  .answer h2 { font-size: 1.25rem; }
  .answer h3 { font-size: 1.05rem; color: var(--moon-mid); }
  .answer h1:first-child, .answer h2:first-child, .answer h3:first-child { margin-top: 0; }

  .answer p { margin-bottom: 12px; }
  .answer strong { color: var(--moon-mid); font-weight: 500; }
  .answer em { font-style: italic; color: var(--text-mid); }
  .answer ul, .answer ol { margin: 8px 0 12px 18px; }
  .answer li { margin-bottom: 5px; }

  .answer a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--accent-border);
    transition: border-color 0.2s, color 0.2s;
  }

  .answer a:hover { color: #5a8070; border-color: var(--accent); }

  .answer table {
    width: 100%;
    border-collapse: collapse;
    margin: 14px 0;
    font-size: 0.8rem;
  }

  .answer th {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1.5px solid var(--border);
    color: var(--moon-mid);
    font-weight: 400;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    background: var(--surface2);
  }

  .answer td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .answer tr:last-child td { border-bottom: none; }

  .answer code {
    font-family: 'DM Mono', monospace;
    font-size: 0.78em;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 3px;
    color: var(--accent);
  }

  .answer blockquote {
    border-left: 2px solid var(--accent-border);
    padding: 2px 0 2px 16px;
    color: var(--text-mid);
    margin: 12px 0;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
  }

  .answer hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* チャットエリア */
  .chat-area {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 24px;
    min-height: 0;
  }

  .bubble {
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .user-bubble {
    align-self: flex-end;
    max-width: 75%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px 16px 4px 16px;
    padding: 12px 18px;
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.6;
  }

  .assistant-bubble {
    align-self: flex-start;
    width: 100%;
  }

  .assistant-bubble .log-badges {
    margin-bottom: 10px;
  }

  /* 入力エリア（固定ではなく自然なフロー） */
  .input-area {
    position: sticky;
    bottom: 0;
    background: linear-gradient(to bottom, transparent, var(--bg) 30%);
    padding: 16px 0 24px;
    margin-top: 8px;
  }

  #clearBtn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.85rem;
    padding: 6px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
  }

  #clearBtn:hover {
    border-color: var(--border-focus);
    color: var(--text-mid);
  }

  footer {
    margin-top: 32px;
    padding: 20px 0 48px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  footer span {
    font-size: 0.58rem;
    color: var(--text-dim);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="moon-mark">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="18" stroke="#c4aa88" stroke-width="0.6" opacity="0.4"/>
        <path d="M20 3C10.6 3 3 10.6 3 20C3 29.4 10.6 37 20 37C24.1 37 27.9 35.5 30.8 33C28.1 33.6 25.2 33.5 22.4 32.5C16.2 30.2 12.1 24.2 12.6 17.5C13.1 11 18 5.7 24.5 4.5C23.1 4.2 21.6 4 20 3Z" fill="#8a6e50"/>
        <circle cx="14" cy="17" r="1.2" fill="#f5f2ee" opacity="0.5"/>
        <circle cx="23" cy="26" r="1.6" fill="#f5f2ee" opacity="0.35"/>
        <circle cx="18" cy="25" r="0.8" fill="#f5f2ee" opacity="0.3"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Lunar Explorer</h1>
      <p>AI-powered research engine · Crescent Grove</p>
    </div>
  </header>

  <!-- チャット履歴エリア -->
  <div class="chat-area" id="chatArea"></div>

  <!-- ローディング -->
  <div class="loading" id="loading">
    <div class="loading-row">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText"><em>探索中</em>...</div>
    </div>
    <div class="live-log" id="liveLog"></div>
  </div>

  <div class="error-area" id="errorArea"></div>

  <!-- 入力エリア（常時表示） -->
  <div class="input-area">
    <div class="search-box">
      <span class="search-prefix">探索 ›</span>
      <input type="text" id="query" placeholder="何でも聞いてください..." autocomplete="off" />
      <div class="search-controls">
        <select class="iter-select" id="maxIter" title="最大検索回数">
          <option value="3">3x</option>
          <option value="5" selected>5x</option>
          <option value="7">7x</option>
        </select>
        <button id="searchBtn">LAUNCH</button>
        <button id="clearBtn" title="会話をリセット">↺</button>
      </div>
    </div>
  </div>

  <footer>
    <span>Lunar Explorer v1.1 · Gemma4 + SearXNG</span>
    <span>🌙</span>
  </footer>
</div>

<script>
const API = 'http://localhost:8765';
let chatHistory = []; // {role, content} のリスト（サーバーに送る形式）
let turnCount = 0;

function md(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)(\n(?!<li>)|$)/g,'<ul>$1</ul>\n')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/\n\n+/g,'</p><p>');
}

function addUserBubble(query) {
  const el = document.createElement('div');
  el.className = 'bubble user-bubble';
  el.textContent = query;
  document.getElementById('chatArea').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function addAssistantBubble(answer, searchLog) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble assistant-bubble';

  // 検索バッジ
  if (searchLog && searchLog.length > 0) {
    const badges = document.createElement('div');
    badges.className = 'log-badges';
    searchLog.forEach((s, i) => {
      const b = document.createElement('span');
      b.className = 'badge';
      b.innerHTML = `<span class="n">#${i+1}</span>${s.query}`;
      badges.appendChild(b);
    });
    wrap.appendChild(badges);
  }

  // 回答本文
  const ans = document.createElement('div');
  ans.className = 'answer';
  ans.innerHTML = '<p>' + md(answer) + '</p>';
  wrap.appendChild(ans);

  document.getElementById('chatArea').appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function addLog(text, cls) {
  const el = document.createElement('div');
  el.className = `log-item ${cls}`;
  el.textContent = text;
  document.getElementById('liveLog').appendChild(el);
}

async function doSearch() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;
  const maxIter = parseInt(document.getElementById('maxIter').value);

  document.getElementById('query').value = '';
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('loading').classList.add('active');
  document.getElementById('errorArea').classList.remove('active');
  document.getElementById('liveLog').innerHTML = '';
  document.getElementById('loadingText').innerHTML = '<em>探索中</em>...';

  addUserBubble(query);
  addLog(`▸ "${query}"`, 'q');

  try {
    const res = await fetch(`${API}/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query,
        max_iterations: maxIter,
        history: chatHistory
      })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.status !== 'success') throw new Error(data.message || 'エラー');

    (data.search_log || []).forEach(s => {
      addLog(`  ↳ ${s.query}  (${s.results_count}件)`, 'j');
    });
    document.getElementById('loadingText').innerHTML = '<em>統合完了</em>';

    // 対話履歴に追加（次回のコンテキストとして使う）
    chatHistory.push({ role: 'user', content: query });
    chatHistory.push({ role: 'assistant', content: data.answer });
    turnCount++;

    setTimeout(() => {
      document.getElementById('loading').classList.remove('active');
      addAssistantBubble(data.answer, data.search_log);
    }, 300);

  } catch(e) {
    document.getElementById('loading').classList.remove('active');
    const err = document.getElementById('errorArea');
    err.textContent = `エラー: ${e.message}`;
    err.classList.add('active');
  }
  document.getElementById('searchBtn').disabled = false;
  document.getElementById('query').focus();
}

function clearChat() {
  chatHistory = [];
  turnCount = 0;
  document.getElementById('chatArea').innerHTML = '';
  document.getElementById('errorArea').classList.remove('active');
}

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('clearBtn').addEventListener('click', clearChat);
document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
